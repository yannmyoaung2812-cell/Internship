<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Calculator</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(121, 121, 121);
        }
        .container {
            width:300px;
            height:600px;
            background-color: white;           
            margin:50px auto;
            border:none;
            border-radius: 20px;
        }
        button {
            width: 55px;
            height: 55px;
            margin:4px 2px;
            border:none;
            background: rgb(183, 180, 180);
            color: rgb(24, 104, 224);
            border-radius: 55px;
            font-size: 1em;
        }

        .answer {
            margin-bottom: 180px;
            text-align: end;
            margin-right: 30px;
            padding-top: 50px;
            font-size: 30px;
            color:green;
        }
        .btn-div {
            margin-left: 28px;
        }

        .btn{
            font-size: 25px;
        }

        #ac{
            color: brown;
        }
        #delete{
            color: brown;
        }
        #sign{
            color:brown;
            font-size: 20px;
        }
        #equal{
            color:white;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="answer" id="ans">
            0|
        </div>
            <div class="btn-div">
                <button class="btn" id="ac">C</button>
                <button class="btn" id="delete">Del</button>
                <button class="btn">%</button>
                <button class="btn" id="sign">/</button>
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn" id="sign">*</button>
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn" id="sign">-</button>
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn" id="sign">+</button>
                <button class="btn">( )</button>
                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn" id="equal">=</button>
            </div>
        </div>
    <script>
    const ans = document.getElementById("ans");
    const buttons = document.querySelectorAll("button");

    let expression = "";

    buttons.forEach((button) => {
    button.addEventListener("click", () => {

        const value = button.innerText;

        if (value === "C") {
            expression = "";
            ans.innerText = "0";
        }

        else if (value === "Del") {
            expression = expression.slice(0, -1);
            ans.innerText = expression || "0";
        }

        else if (value === "=") {
            try {
                expression = eval(expression).toString();
                ans.innerText = expression;
            } catch {
                ans.innerText = "Error";
                expression = "";
            }
        }

        else {
            expression += value;
            ans.innerText = expression;
        }

        });
    });
    </script>
</body>
</html>

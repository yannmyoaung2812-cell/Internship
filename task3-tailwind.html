<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3-tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
    <main class="bg-blue-400 p-4 grid lg:grid-cols-4 gap-8 md:grid-cols-2 sm:grid-cols-1">

        <div class="bg-white p-4 rounded-lg">
            <p class="bg-amber-200 inline p-1 rounded-lg">🏠</p>
            <h1 class="font-extrabold">2.4k</h1>
            <p class="text-xs text-gray-400">Page Views</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="bg-blue-300 inline p-1 rounded-lg">💵</p>
            <h1 class="font-extrabold">$8.2k</h1>
            <p class="text-xs text-gray-400">Revenue</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="bg-green-300 inline p-1 rounded-lg">👥</p>
            <h1 class="font-extrabold">892</h1>
            <p class="text-xs text-gray-400">New Users</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="bg-pink-300 inline p-1 rounded-lg">⭐</p>
            <h1 class="font-extrabold">4.9</h1>
            <p class="text-xs text-gray-400">Rating</p>
        </div>

    </main>
</body>
</html>
